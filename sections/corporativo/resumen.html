<div class="pane-head">
  <div>
    <h3>Resumen general</h3>
    <p>Estado consolidado de la misión a la fecha.</p>
  </div>
</div>
<div class="stats-grid">
  <div class="stat">
    <div class="label">Total miembros</div>
    <div class="value" id="stat-total">—</div>
    <div class="delta">en las 3 iglesias</div>
  </div>
  <div class="stat">
    <div class="label">Miembros activos</div>
    <div class="value" id="stat-activos">—</div>
    <div class="delta up">al día con su estado</div>
  </div>
  <div class="stat">
    <div class="label">Saldo consolidado</div>
    <div class="value" id="stat-saldo">$ 0</div>
    <div class="delta">ingresos − egresos</div>
  </div>
  <div class="stat">
    <div class="label">Movimientos del mes</div>
    <div class="value" id="stat-movs">0</div>
    <div class="delta">registros contables</div>
  </div>
</div>
<h4 style="margin-bottom: 14px; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600;">Saldo por iglesia</h4>
<div class="table-wrap">
  <table id="resumen-iglesias">
    <thead>
      <tr><th>Iglesia</th><th>Ingresos</th><th>Egresos</th><th>Saldo</th><th>Miembros</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
